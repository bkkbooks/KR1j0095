body:
  text: 爾雅施氏音釋詁第一昄晊昄蒲滿反陸德明釋文戢搜所救切丁度集韻四十九宥搜字注洋觀古渙反注同釋文噊幾噊音述𧰙汔也汔音既治肆古故也治直吏反尼定尼女乙反並同上鴻昏於顯間代也閒胡瞎反釋文下瞎切司馬光類篇卷十二上㕟齂呬息也齂海拜反釋文引郭施謝呬火季切集韻去聲六至呬字注汱渾汱胡犬反釋文餉仍因也儴息羊反釋文讀曰襄周書君奭云襄我二人邢昺疏貉縮貉胡各反釋文釋言第二觀指示也觀音館釋文啜茹也啜丑衛尺鋭二反釋文丑芮切集韻去聲十三祭啜字注舫舟也舫甫汸反釋文僁聲也僁私秩反字又作𠋱粲餐也餐七丹反並同上釋訓第三萌萌亡朋反釋文夢夢亡增反釋文引沈施慱慱逋莫反釋文萱諼忘也萱音袁同上釋器第六絇謂之救絇苦侯反釋文載轡謂之轙音蟻同上米者謂之糪孚八反釋文普八切餅半熟也集韻入聲十四黠糪字注圜弇上謂之鼒音災釋文釋天第八夏為長嬴長直良反釋文釋丘第十水潦所還埒丘還音旋釋文途出其右而還之畫丘畫胡卦反水出其後沮丘沮子佘反宛中宛丘宛於苑反並同上釋水第十二鬲津鬲力的反釋文釋草第十三𦸣鼠莞音丸釋文蘱薡蕫音童同上蔜𧃒所留反釋文引沈施龍天蘥蘢音龍釋文蓾蔖才古反釋文引施謝雚芄蘭雚音丸釋文蔨鹿𧆑蔨其免反釋文蕧盜庚蕧孚服反望乘車乘音繩困衱袶音絳菟蒵顆涷都弄反讀者以為冬簢筡中筡音儲並同上𦸀月爾𦸀音其今注疏本作藄釋文出𦸀字引施謝姚莖涂齊莖於耕反釋文引施郭茢勃茢二茢皆音列釋文引施謝搴櫃朐搴居展反釋文釋木第十四栩杼音佇或音序釋文諸慮山櫐慮力據反同上楔荊桃楔音結釋文吉屑切木名集韻入聲十六屑楔字注座接慮李慮音驪釋文瘣木苻婁力俱反枹遒木魁瘣魁苦回反瘣胡罪反並同上釋蟲第十五蜓蚞螇螰蜓音亭釋文諸慮奚相慮音驢一音力據反相音葙蒺藜螂蛆蝍音即史馬䗃仕娩反蛭蝚至掌蛭徒結反並同上螽醜螸螽音終釋文蜂施作螽釋魚第十六鱊鮬鱖鯞鮬蒲悲反釋文貧悲切集韻上平聲六脂鮬字注科斗活東活音括釋文引謝施蜌蠯蒲鯁反釋文引施又云本今作蠯小者鰿音賾釋文三曰攝龜攝之協反同上釋鳥第十七鷑鳩鷑音及下同釋文鵱鷜鵝鷜力侯反釋文引謝施䳭鴔戴鵀沒沁反釋文鷯鶉其雄鶛雌庳音婢今注疏本作痺釋文作庳鵹黃楚雀鵹音黎釋文鸕諸雉鸕力魚反秩秩海雉秩音逸釋文弋質切鳥名如雉而黑在海中山上集韻入聲五質秩字注釋獸第十八其跡解佳買反釋文么幼么於遙反虎竊毛謂之虦貓士懶反同上其子狗火候反釋文引沈施貍子𧳙餘棄反釋文釋畜第十九回毛在膺宜乘市升反釋文
